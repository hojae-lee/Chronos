<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="16" stroke="#2ECC8F" stroke-width="2" opacity="0.3"/>
  <!-- Main C-arc (300deg) -->
  <path
    d="M 34 14.5 A 15 15 0 1 0 34 25.5"
    stroke="#2ECC8F"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Inner ring -->
  <circle cx="20" cy="20" r="9" stroke="#2ECC8F" stroke-width="1.5" opacity="0.2"/>
  <!-- Hour hand (to ~1 o'clock) -->
  <line x1="20" y1="20" x2="26.5" y2="12.5" stroke="#2ECC8F" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (to ~8 o'clock) -->
  <line x1="20" y1="20" x2="14" y2="26" stroke="#2ECC8F" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2" fill="#2ECC8F"/>
  <!-- Tick marks -->
  <line x1="20" y1="5"  x2="20" y2="7.5"  stroke="#2ECC8F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="35" y1="20" x2="32.5" y2="20" stroke="#2ECC8F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="35" x2="20" y2="32.5" stroke="#2ECC8F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Orbit dot -->
  <circle cx="11" cy="11" r="1.5" fill="#2ECC8F" opacity="0.6"/>
  <circle cx="29" cy="11" r="1" fill="#2ECC8F" opacity="0.35"/>
</svg>
